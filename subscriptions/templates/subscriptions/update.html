<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Subscription</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            width: 400px;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h3 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }

        /* --- This section fixes the ugly form fields --- */
        form p {
            margin-bottom: 1.25rem;
        }

        form label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #475569;
        }

        form input,
        form select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }

        form input:focus,
        form select:focus {
            outline: none;
            border-color: #000;
        }

        /* ----------------------------------------------- */

        .btn {
            background: #000;
            color: white;
            padding: 0.75rem;
            width: 100%;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .cancel-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .cancel-link:hover {
            color: #000;
        }
    </style>
</head>

<body>
    <div class="card">
        <h3>Edit {{ subscription.name }}</h3>
        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn">Save Changes</button>
            <a href="{% url 'dashboard' %}" class="cancel-link">Cancel</a>
        </form>
    </div>
</body>

</html>
