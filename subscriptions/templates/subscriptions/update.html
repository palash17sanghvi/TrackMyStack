<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TrackMyStack - Edit Subscription</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-top: 4px solid #3498db;
        }

        h3 {
            color: #333;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 22px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .target-name {
            color: #3498db;
            font-weight: bold;
        }

        /* Reusing your Form Layout Styles from Dashboard */
        .form-group p {
            margin-bottom: 15px;
        }

        /* Targeting Django's form controls inside the paragraphs */
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        /* Flex container for side-by-side action buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            background-color: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .btn-cancel {
            background-color: #e2e8f0;
            color: #4a5568;
            border: 1px solid #cbd5e1;
        }

        .btn-cancel:hover {
            background-color: #cbd5e1;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h3>Edit Subscription</h3>
            <div class="subtitle">
                Modifying current details for <span class="target-name">{{ subscription.name }}</span>
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    {{ form.as_p }}
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn">Save Changes</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
