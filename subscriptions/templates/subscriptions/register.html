<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TrackMyStack - Register</title>
</head>

<body
    style="background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: sans-serif;">
    <div
        style="width: 100%; max-width: 400px; padding: 2rem; background: white; border-radius: 12px; border-top: 4px solid #000;">
        <h2 style="margin-top: 0; text-align: center;">Create Account</h2>
        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 1rem;">{{ form.as_p }}</div>
            <button type="submit"
                style="background: #28a745; color: white; border: none; padding: 0.75rem; width: 100%; border-radius: 6px; cursor: pointer; font-weight: 600;">Sign
                Up</button>
        </form>
        <p style="text-align: center; font-size: 0.85rem;"><a href="{% url 'two_factor:login' %}"
                style="color: #000;">Already have an account? Log in</a></p>
    </div>
</body>

</html>
