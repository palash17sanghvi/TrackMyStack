<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>TrackMyStack - Register</title>
</head>

<body
    style="font-family: Arial, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div
        style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; box-sizing: border-box;">
        <h2 style="margin-top: 0; margin-bottom: 20px; color: #2c3e50; text-align: center;">Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                style="background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px;">Sign
                Up</button>
        </form>

        <a href="{% url 'two_factor:login' %}"
            style="display: block; text-align: center; margin-top: 20px; color: #3498db; text-decoration: none; font-size: 14px;">Already
            have an account? Log in</a>
    </div>

</body>

</html>
