<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - TrackMyStack</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            width: 400px;
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #475569;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn {
            background: #000;
            color: white;
            border: none;
            padding: 0.75rem;
            width: 100%;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2 style="margin-top:0;">TrackMyStack</h2>
        <p style="color:#64748b; font-size:0.9rem; margin-bottom: 1.5rem;">
            {% if wizard.steps.current == 'auth' %}Enter credentials{% else %}Enter security token{% endif %}
        </p>
        <form method="POST">
            {% csrf_token %}
            {{ wizard.management_form }}
            <div class="form-group">{{ wizard.form.as_p }}</div>
            <button type="submit" class="btn">
                {% if wizard.steps.current == 'auth' %}
                Login
                {% else %}
                Verify
                {% endif %}
            </button>
        </form>
    </div>
</body>

</html>
